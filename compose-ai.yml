# 실행 시 docker compose -f compose-ai.yml up -d --build
services:
  python-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-python
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      TRYON_MODE: ${TRYON_MODE:-real}
      REDIS_HOST: capstone-redis
      TZ: Asia/Seoul
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /app/models/hf-cache
    volumes:
      - ./workspace/uploads:/app/workspace/uploads
      - ./workspace/results:/app/workspace/results
      - ./workspace/temp:/app/workspace/temp
      - ./mock:/app/mock
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]