services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  spring-app:
    build:
      context: ./spring
      dockerfile: Dockerfile
    container_name: capstone-spring
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      PYTHON_SERVICE_URL: http://python-app:8000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-app:
        condition: service_started
    networks:
      - capstone-net

  python-app:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: capstone-python
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV}
      TRYON_MODE: ${TRYON_MODE}
      REDIS_URL: redis://redis:6379/0
      WORKSPACE_DIR: /app/workspace
      MOCK_RESULT_IMAGE: /app/workspace/mock/mock_result.jpg
      IDM_VTON_ROOT: /app/vton
    volumes:
      - ./python/workspace:/app/workspace
      - ./python/models:/app/models
      - ./python/mock:/app/workspace/mock
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - capstone-net

volumes:
  mysql_data:
  redis_data:

networks:
  capstone-net:
    driver: bridge
