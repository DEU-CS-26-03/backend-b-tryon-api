version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: capstone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: capstone_db
      MYSQL_USER: capstone
      MYSQL_PASSWORD: capstonepass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  spring-app:
    build:
      context: ./spring
      dockerfile: Dockerfile
    container_name: capstone-spring
    ports:
      - "8080:8080"
    networks:
      - capstone-net



  python-app:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: capstone-python
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - capstone-net

volumes:
  mysql_data:
  redis_data:

networks:
  capstone-net:
    driver: bridge
